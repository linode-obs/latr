{{- if ne (include "latr.multiAccount" .) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "latr.fullname" . }}
  labels:
    {{- include "latr.labels" . | nindent 4 }}
data:
  {{- if .Values.configFiles }}
  {{- range $name, $content := .Values.configFiles }}
  {{ $name }}: |
    {{- $content | nindent 4 }}
  {{- end }}
  {{- else }}
  config.yaml: |
    daemon:
      mode: {{ .Values.config.daemon.mode }}
      check_interval: {{ .Values.config.daemon.checkInterval | quote }}
      dry_run: {{ .Values.config.daemon.dryRun }}

    rotation:
      threshold_percent: {{ .Values.config.rotation.thresholdPercent }}
      prune_expired: {{ .Values.config.rotation.pruneExpired }}

    vault:
      address: {{ .Values.config.vault.address | quote }}
      role_id: "${VAULT_ROLE_ID}"
      secret_id: "${VAULT_SECRET_ID}"
      mount_path: {{ .Values.config.vault.mountPath | quote }}

    observability:
      {{- if .Values.config.observability.otelEndpoint }}
      otel_endpoint: {{ .Values.config.observability.otelEndpoint | quote }}
      {{- end }}
      log_level: {{ .Values.config.observability.logLevel | quote }}

    tokens:
      {{- toYaml .Values.config.tokens | nindent 6 }}
  {{- end }}
{{- end }}
{{- if eq (include "latr.multiAccount" .) "true" }}
{{- range $account := .Values.accounts }}
{{- $ctx := dict "root" $ "account" $account }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "latr.accountFullname" $ctx }}
  labels:
    {{- include "latr.accountLabels" $ctx | nindent 4 }}
data:
  {{- if $account.configFiles }}
  {{- range $name, $content := $account.configFiles }}
  {{ $name }}: |
    {{- $content | nindent 4 }}
  {{- end }}
  {{- else if $account.config }}
  {{/* Expect latr-native YAML keys (snake_case). Prefer configFiles for multi-file layouts. */}}
  config.yaml: |
    {{- toYaml $account.config | nindent 4 }}
  {{- else }}
  {{- fail (printf "account %s: set configFiles or config" (include "latr.accountFullname" $ctx)) }}
  {{- end }}
{{- end }}
{{- end }}
