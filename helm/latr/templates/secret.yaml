{{- if ne (include "latr.multiAccount" .) "true" }}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "latr.fullname" . }}
  labels:
    {{- include "latr.labels" . | nindent 4 }}
type: Opaque
stringData:
  linode-token: {{ .Values.secrets.linodeToken | quote }}
  vault-role-id: {{ .Values.secrets.vaultRoleId | quote }}
  vault-secret-id: {{ .Values.secrets.vaultSecretId | quote }}
{{- end }}
{{- end }}
{{- if eq (include "latr.multiAccount" .) "true" }}
{{- range $account := .Values.accounts }}
{{- $ctx := dict "root" $ "account" $account }}
{{- $secrets := $account.secrets | default dict }}
{{- if not $secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "latr.accountFullname" $ctx }}
  labels:
    {{- include "latr.accountLabels" $ctx | nindent 4 }}
type: Opaque
stringData:
  linode-token: {{ $secrets.linodeToken | default "" | quote }}
  vault-role-id: {{ $secrets.vaultRoleId | default "" | quote }}
  vault-secret-id: {{ $secrets.vaultSecretId | default "" | quote }}
{{- end }}
{{- end }}
{{- end }}
